		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />

		<meta property="og:title" content="Contact Us | River Island Gym - Marshall, NC" />
		<meta property="og:description" content="Get in touch with River Island Gym. We would love to hear from you about our community-building project in Madison County." />
		<meta property="og:url" content="https://www.riverislandgym.com/contact.html" />
		<meta property="og:type" content="website" />
		<link rel="stylesheet" href="assets/css/main.css" />
	</head>
	<body class="is-preload">
		<div id="page-wrapper">

			<!-- Header -->
				<header id="header">
					<nav id="nav">
						<ul>
							<li><a href="index.html">Home</a></li>
							<li>
								<a href="#" class="icon solid fa-angle-down">Menu</a>
								<ul>
									<li><a href="spaces.html">Property Features</a></li>
									<li><a href="site.html">Project Site</a></li>
									<li><a href="contact.html">Contact</a></li>
								</ul>
							</li>
						</ul>
					</nav>
				</header>

			<!-- Main -->
				<section id="main" class="container medium">
					<header>
						<h1>Contact Us</h1>
						<p>We would love to hear from you</p>
					</header>
					<div class="box">
						<form id="contact-form" method="POST" action="https://api.web3forms.com/submit">
							<input type="hidden" name="access_key" value="f17f6971-15b7-4fb8-a577-146b6deb03ed">

							<!-- Honeypot Spam Protection -->
							<input type="checkbox" name="botcheck" class="hidden" style="display: none;">

							<div class="row gtr-50 gtr-uniform">
								<div class="col-6 col-12-mobilep">
									<input type="text" name="name" id="name" value="" placeholder="Name" required />
								</div>
								<div class="col-6 col-12-mobilep">
									<input type="email" name="email" id="email" value="" placeholder="Email" required />
								</div>
								<div class="col-12">
									<textarea name="message" id="message" placeholder="Enter your message" rows="6" required></textarea>
								</div>
								<div class="col-12">
									<!-- hCaptcha Spam Protection -->
									<div class="h-captcha" data-captcha="true"></div>
								</div>
								<div class="col-12">
									<ul class="actions special">
										<li><input type="submit" value="Send Message" /></li>
									</ul>
								</div>
							</div>
						</form>
					</div>
				</section>

			<!-- Footer -->
				<footer id="footer">
					<div class="footer-location">
						<p>116 Blannahassett Island Rd<br>Marshall, NC 28753</p>
						<iframe src="https://maps.google.com/maps?q=116%20Blannahassett%20Island%20Rd,%20Marshall,%20NC%2028753&t=&z=13&ie=UTF8&iwloc=&output=embed" width="100%" height="150" style="border:0; border-radius: 6px; margin-top: 1em;" allowfullscreen="" loading="lazy"></iframe>
					</div>
					<div class="footer-logo">
						<img src="images/rig_red_circle.png" alt="River Island Gym Logo" />
					</div>
					<div class="footer-contact">
						<!--
						<ul class="icons">
							<li><a href="#" class="icon brands fa-twitter"><span class="label">Twitter</span></a></li>
							<li><a href="#" class="icon brands fa-facebook-f"><span class="label">Facebook</span></a></li>
							<li><a href="#" class="icon brands fa-instagram"><span class="label">Instagram</span></a></li>
						</ul>
						-->
						<h4><a href="mailto:info@riverislandgym.com">info@riverislandgym.com</a></h4>
						<br><h5>River Island Gym is a nonprofit 501(c)(3) pending/approved</h5>
					</div>
	
				</footer>
		</div>

		<!-- Scripts -->
			<script src="assets/js/jquery.min.js"></script>
			<script src="assets/js/jquery.dropotron.min.js"></script>
			<script src="assets/js/jquery.scrollex.min.js"></script>
			<script src="assets/js/browser.min.js"></script>
			<script src="assets/js/breakpoints.min.js"></script>
			<script src="assets/js/util.js"></script>
			<script src="assets/js/main.js"></script>
			<script src="https://web3forms.com/client/script.js" async defer></script>

			<!-- Client-side hCaptcha Validation -->
			<script>
				const form = document.getElementById('contact-form');
				form.addEventListener('submit', function(e) {
					const hCaptcha = form.querySelector('textarea[name=h-captcha-response]');
					if (!hCaptcha || !hCaptcha.value) {
						e.preventDefault();
						alert("Please check the 'I am human' captcha box before sending.");
					}
				});
			</script>

	</body>
</html>
